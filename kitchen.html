<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Chaska Kitchen Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <div class="flex justify-between items-center mb-10 border-b border-slate-700 pb-5">
        <h1 class="text-4xl font-black text-orange-500 italic">KITCHEN DASHBOARD</h1>
        <div class="bg-green-500/10 text-green-400 px-4 py-2 rounded-full text-xs font-bold border border-green-500/20">LIVE</div>
    </div>

    <div id="orders-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        // Wahi same Config yahan dalo
        const firebaseConfig = { /* ... copied from above ... */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('orders').on('value', (snapshot) => {
            const grid = document.getElementById('orders-grid');
            grid.innerHTML = '';
            const data = snapshot.val();
            if(data) {
                Object.keys(data).forEach(id => {
                    const order = data[id];
                    if(order.status === 'pending') {
                        grid.innerHTML += `<div class="bg-slate-800 p-6 rounded-3xl border-t-8 border-orange-500">
                            <h2 class="text-3xl font-black mb-4">TABLE #${order.table_no}</h2>
                            <p class="text-xl font-bold bg-slate-700 p-4 rounded-xl mb-6">${order.items}</p>
                            <button onclick="markDone('${id}')" class="w-full bg-green-600 py-4 rounded-2xl font-black uppercase">Ready ✅</button>
                        </div>`;
                    }
                });
                document.getElementById('bell').play();
            }
        });

        function markDone(id) {
            db.ref('orders/' + id).update({ status: 'completed' });
        }
    </script>
</body>
</html>
