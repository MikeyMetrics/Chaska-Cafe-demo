<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaska Cafe | Order</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .card { background: white; border-radius: 24px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 bg-white border-b sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black italic text-indigo-600 uppercase">Chaska Cafe</h1>
            <p id="table-no" class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Table: Detecting...</p>
        </div>
    </header>

    <div id="menu" class="p-4 space-y-4">
        <div class="card p-4 flex items-center gap-4">
            <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 text-xl font-black">B</div>
            <div class="flex-1">
                <h4 class="font-black text-xs uppercase">Veg Cheese Burger</h4>
                <p class="text-indigo-600 font-black">₹89</p>
            </div>
            <button onclick="addToCart('Veg Cheese Burger', 89)" class="bg-indigo-600 text-white w-10 h-10 rounded-xl shadow-lg"><i class="fa-solid fa-plus"></i></button>
        </div>

        <div class="card p-4 flex items-center gap-4">
            <div class="w-16 h-16 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-600 text-xl font-black">C</div>
            <div class="flex-1">
                <h4 class="font-black text-xs uppercase">Cold Coffee</h4>
                <p class="text-indigo-600 font-black">₹60</p>
            </div>
            <button onclick="addToCart('Cold Coffee', 60)" class="bg-indigo-600 text-white w-10 h-10 rounded-xl shadow-lg"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 hidden z-50">
        <button onclick="showForm()" class="w-full bg-slate-900 text-white p-5 rounded-[2rem] flex justify-between items-center shadow-2xl">
            <span id="count" class="bg-indigo-500 w-8 h-8 rounded-full text-xs flex items-center justify-center font-black">0</span>
            <span class="text-xs font-black uppercase">View Order</span>
            <span id="total" class="font-black text-lg">₹0</span>
        </button>
    </div>

    <div id="form-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-8 space-y-4">
            <h3 class="text-2xl font-black italic">Aapki Details</h3>
            <input id="c-name" type="text" placeholder="Aapka Naam" class="w-full bg-slate-50 p-5 rounded-2xl font-bold outline-none border-none">
            <input id="c-phone" type="number" placeholder="Mobile Number" class="w-full bg-slate-50 p-5 rounded-2xl font-bold outline-none border-none">
            <button onclick="sendOrder()" id="send-btn" class="w-full bg-indigo-600 text-white py-6 rounded-[2rem] font-black uppercase shadow-xl">Place Order 🚀</button>
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="w-full text-slate-400 font-bold text-xs uppercase">Back</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlpRY4QJpcaZhR6PRshFBEaIt63zbammI",
            authDomain: "chaska-pos-4fb1a.firebaseapp.com",
            databaseURL: "https://chaska-pos-4fb1a-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "chaska-pos-4fb1a",
            storageBucket: "chaska-pos-4fb1a.firebasestorage.app",
            messagingSenderId: "878605199091",
            appId: "1:878605199091:web:2fd2757f8edd8e804bb986"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cart = [];
        const tableNum = new URLSearchParams(window.location.search).get('table') || "Table-1";
        document.getElementById('table-no').innerText = "TABLE: " + tableNum;

        function addToCart(n, p) {
            cart.push({name: n, price: p});
            document.getElementById('cart-bar').classList.remove('hidden');
            document.getElementById('count').innerText = cart.length;
            document.getElementById('total').innerText = "₹" + cart.reduce((s,i) => s+i.price, 0);
        }

        function showForm() { document.getElementById('form-modal').classList.remove('hidden'); }

        function sendOrder() {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            if(!name || phone.length < 10) return alert("Pura Details Fill Karo!");

            const oid = "ORD-" + Math.floor(1000 + Math.random() * 9000);
            document.getElementById('send-btn').innerText = "Sending...";

            db.ref('orders/' + oid).set({
                customer_name: name,
                customer_phone: phone,
                items: cart.map(i => i.name).join(', '),
                table_no: tableNum,
                status: "Pending",
                timestamp: Date.now()
            }).then(() => {
                alert("Order Sent Successfully!");
                location.reload();
            }).catch(e => alert("Error: " + e.message));
        }
    </script>
</body>
</html>
