<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaska | Digital Menu</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F9FAFB; }
        
        .header-gradient { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        .category-pill { transition: 0.3s; white-space: nowrap; }
        .category-pill.active { background: #4f46e5; color: white; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); }
        
        .item-card { background: white; border-radius: 20px; transition: 0.2s; border: 1px solid #F1F5F9; }
        .item-card:active { transform: scale(0.97); }
        
        .floating-cart { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #4f46e5; border-radius: 16px; display: none; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <header class="header-gradient pt-10 pb-20 px-6 rounded-b-[40px] shadow-xl">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-white text-2xl font-800 tracking-tighter">CHASKA <span class="text-indigo-400">CAFE</span></h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Table No: <span id="display-table">01</span></p>
            </div>
            <div class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center text-white border border-white/20">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </div>
        <input type="text" placeholder="Search your favorite dish..." class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-slate-400 outline-none backdrop-blur-md">
    </header>

    <div class="px-6 -mt-8 overflow-x-auto no-scrollbar flex gap-3 pb-4">
        <button class="category-pill active px-6 py-3 rounded-full bg-white text-slate-600 font-800 text-xs shadow-md border">🔥 Popular</button>
        <button class="category-pill px-6 py-3 rounded-full bg-white text-slate-600 font-800 text-xs shadow-sm border">🍕 Pizza</button>
        <button class="category-pill px-6 py-3 rounded-full bg-white text-slate-600 font-800 text-xs shadow-sm border">🥤 Drinks</button>
        <button class="category-pill px-6 py-3 rounded-full bg-white text-slate-600 font-800 text-xs shadow-sm border">🍔 Burgers</button>
    </div>

    <main class="px-6 mt-6">
        <h3 class="font-800 text-slate-900 text-lg mb-4">Recommended for You</h3>
        <div id="menu-container" class="space-y-4">
            </div>
    </main>

    <div id="cart-bar" class="floating-cart p-4 shadow-2xl flex justify-between items-center text-white z-50">
        <div>
            <p id="items-count" class="text-[10px] font-bold uppercase tracking-widest text-indigo-200">1 Item Added</p>
            <p class="text-lg font-800">₹<span id="total-price">0</span></p>
        </div>
        <button onclick="sendOrder()" class="bg-white text-indigo-600 px-6 py-3 rounded-xl font-800 text-sm flex items-center gap-2">
            Order Now <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlpRY4QJpcaZhR6PRshFBEaIt63zbammI",
            authDomain: "chaska-pos-4fb1a.firebaseapp.com",
            databaseURL: "https://chaska-pos-4fb1a-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "chaska-pos-4fb1a",
            storageBucket: "chaska-pos-4fb1a.firebasestorage.app",
            messagingSenderId: "878605199091",
            appId: "1:878605199091:web:2fd2757f8edd8e804bb986"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let cart = [];

        // LOAD MENU FROM DATABASE
        db.ref('menu').on('value', snap => {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            snap.forEach(c => {
                const i = c.val();
                container.innerHTML += `
                    <div class="item-card p-4 flex justify-between items-center">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="w-3 h-3 border border-green-500 flex items-center justify-center"><span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span></span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase">Best Seller</span>
                            </div>
                            <h4 class="font-800 text-slate-800">${i.name}</h4>
                            <p class="text-indigo-600 font-800 mt-1">₹${i.price}</p>
                        </div>
                        <button onclick="addToCart('${i.name}', ${i.price})" class="bg-indigo-50 text-indigo-600 px-5 py-2 rounded-xl font-800 text-sm border border-indigo-100 hover:bg-indigo-600 hover:text-white transition">
                            ADD
                        </button>
                    </div>`;
            });
        });

        function addToCart(name, price) {
            cart.push({name, price});
            updateCartUI();
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            const totalText = document.getElementById('total-price');
            const countText = document.getElementById('items-count');
            
            if(cart.length > 0) {
                bar.style.display = 'flex';
                let total = cart.reduce((sum, item) => sum + item.price, 0);
                totalText.innerText = total;
                countText.innerText = `${cart.length} Item${cart.length > 1 ? 's' : ''} Added`;
            }
        }

        function sendOrder() {
            const table = new URLSearchParams(window.location.search).get('table') || "Table 1";
            const items = cart.map(i => i.name).join(', ');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            db.ref('orders').push({
                customer_name: "QR Customer",
                table_no: table,
                items: items,
                bill_amount: total,
                status: 'KOT',
                timestamp: Date.now()
            });
            
            alert("Order Bhej Diya Hai! Tyari shuru...");
            cart = [];
            document.getElementById('cart-bar').style.display = 'none';
        }
    </script>
</body>
</html>
